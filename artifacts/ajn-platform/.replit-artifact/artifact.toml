kind = "web"
previewPath = "/"
title = "AJN — مجموعة علي جان"
version = "1.0.0"
id = "artifacts/ajn-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20796

[services.development]
run = "pnpm --filter @workspace/ajn-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ajn-platform", "run", "build" ]
publicDir = "artifacts/ajn-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20796"
BASE_PATH = "/"
